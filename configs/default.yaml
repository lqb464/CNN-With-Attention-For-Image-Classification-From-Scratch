project:
  name: "CNN-Foundations-to-Application"
  output_dir: "outputs/cnn_baseline"
  seed: 42
  data_dir: "data"

model:
  use_attention: false
  attention_reduction: 16
  dropout_rate: 0.5
  num_classes: 10

data:
  batch_size: 64
  num_samples: null
  augment:
    random_flip_prob: 0.5
    random_crop_padding: 4

training:
  optimizer: "adam"
  lr: 0.001
  epochs: 20
  resume: false
  log_every: 100

evaluation:
  checkpoint: "best_checkpoint.pt"
  save_plots: true
  num_prediction_samples: 16
